.completion-banner h3 { font-size: 18px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
.completion-banner p { font-size: 14px; color: var(--ink-soft); }

/* ============================================
   Collapsible Review
   ============================================ */
.review-toggle {
  display: block; width: 100%; padding: 14px 20px; background: var(--surface);
  border: 1px solid var(--rule); border-radius: var(--radius-sm);
  text-align: left; font-size: 14px; font-weight: 600; color: var(--ink-soft);
  cursor: pointer; transition: var(--transition); margin-bottom: 8px;
}
.review-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.review-toggle::after { content: ' ▼'; font-size: 11px; color: var(--muted); }
.review-toggle.open::after { content: ' ▲'; }
.review-content { display: none; }
.review-content.open { display: block; }
.review-content .exercise-block .fill-input { opacity: 0.6; }
.review-content .exercise-block .choice-btn { cursor: default; }
.review-content .exercise-block .choice-btn:hover { border-color: var(--rule); background: var(--surface); }
.review-content .exercise-block .submit-btn { display: none; }

/* ============================================
   Memory Sentence
   ============================================ */
.memory-card {
  background: linear-gradient(135deg, #FAF0E6, #FFF8F0);
  border: 2px solid var(--gold); border-radius: var(--radius);
  padding: 24px; margin-bottom: 20px; text-align: center;
  box-shadow: 0 4px 16px var(--gold-glow);
}
.memory-card .memory-label {
  font-size: 12px; color: var(--gold); font-weight: 600; letter-spacing: 2px;
  margin-bottom: 12px; text-transform: uppercase;
}
.memory-card .memory-jp {
  font-size: 22px; font-weight: 700; font-family: var(--font-jp);
  line-height: 1.6; margin-bottom: 8px; color: var(--ink);
}
.memory-card .memory-hint {
  font-size: 13px; color: var(--muted); cursor: pointer;
  padding: 6px 12px; border-radius: 20px; display: inline-block;
  transition: var(--transition);
}
.memory-card .memory-hint:hover { background: var(--gold-glow); color: #8B7520; }
.memory-card .memory-trans {
  font-size: 15px; color: var(--ink-soft); margin-top: 8px;
  display: none; font-style: italic;
}
.memory-card .memory-trans.show { display: block; }
.memory-card .memory-mnemonic {
  margin-top: 12px; padding: 12px 16px; background: rgba(200, 168, 78, 0.1);
  border-radius: var(--radius-sm); font-size: 14px; color: #6D4C00;
  display: none; line-height: 1.7;
}
.memory-card .memory-mnemonic.show { display: block; }

/* ============================================
   Today's Task Card (New UI)
   ============================================ */
.today-task-card {
  background: linear-gradient(135deg, var(--bg2), var(--surface));
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.today-task-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--muted);
}
.today-task-mentor {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.today-task-mentor .mentor-mini-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  font-weight: 700;
}
.today-task-mentor .mentor-waiting {
  font-size: 16px;
  color: var(--ink);
}
.today-task-mentor .mentor-waiting strong {
  color: var(--accent);
}
.today-task-topic {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 8px;
}
.today-task-estimate {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}
.today-task-btn {
  width: 100%;
  padding: 14px;
  background: var(--accent2);
  color: white;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  border: none;
}
.today-task-btn:hover { background: var(--accent2-hover); transform: translateY(-2px); }

/* Health Status Card */
.health-card {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  border: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 12px;
}
.health-icon {
  font-size: 24px;
}
.health-text {
  flex: 1;
}
.health-label {
  font-size: 13px;
  color: var(--muted);
}
.health-status {
  font-size: 15px;
  font-weight: 600;
}
.health-status.green { color: var(--accent2); }
.health-status.yellow { color: var(--gold); }
.health-status.red { color: var(--accent); }
.health-advice {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 4px;
}

/* Week Progress Mini */
.week-progress-mini {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}
.week-progress-mini .progress-label {
  font-size: 13px;
  color: var(--muted);
}
.week-progress-mini .progress-dots {
  display: flex;
  gap: 6px;
}
.progress-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--rule);
}
.progress-dot.done { background: var(--accent2); }
.progress-dot.current { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* Streak Badge */
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--gold-glow);
  border-radius: 20px;
  font-size: 13px;
  color: #8B7520;
  font-weight: 600;
}

/* Mentor Selector Page */
.mentor-select-page {
  text-align: center;
}
.mentor-select-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--ink);
}
.mentor-select-card {
  background: var(--bg2);
  border: 2px solid var(--rule);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  text-align: left;
  cursor: pointer;
  transition: var(--transition);
}
.mentor-select-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); }
.mentor-select-card.selected { border-color: var(--accent2); background: var(--accent2-glow); }
.mentor-select-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.mentor-select-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: white;
  font-weight: 700;
}
.mentor-select-name {
  font-size: 18px;
  font-weight: 700;
}
.mentor-select-style {
  font-size: 13px;
  color: var(--muted);
}
.mentor-select-desc {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.mentor-select-suit {
  font-size: 12px;
  color: var(--accent);
}
.mentor-select-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent2);
  color: white;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
}
.mentor-select-card:hover .mentor-select-btn { background: var(--accent2-hover); }

/* Grammar Library Item */
.grammar-lib-item {
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
  border: 1px solid var(--rule);
  transition: var(--transition);
}
.grammar-lib-item:hover { box-shadow: var(--shadow); }
.grammar-lib-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.grammar-lib-name {
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.grammar-lib-status {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 600;
}
.grammar-lib-meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}
.grammar-lib-action {
  padding: 8px 16px;
  background: var(--accent);
  color: white;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.grammar-lib-action:hover { background: var(--accent-hover); }

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--rule);
  padding: 8px 0;
  z-index: 200;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
}
.bottom-nav-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  display: flex;
  justify-content: space-around;
  padding: 0 10px;
}
.bottom-nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  background: none;
}
.bottom-nav-btn:hover { background: var(--accent-glow); color: var(--accent); }
.bottom-nav-btn.active { color: var(--accent); background: var(--accent-glow); }
.bottom-nav-btn .nav-icon {
  font-size: 20px;
}
.bottom-nav-btn .nav-label {
  font-weight: 500;
}

/* Achievement Badge */
.achievement-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--gold-glow);
  border-radius: var(--radius-sm);
  border: 1px solid var(--gold);
}
.achievement-preview .ach-icon {
  font-size: 28px;
}
.achievement-preview .ach-text {
  flex: 1;
}
.achievement-preview .ach-title {
  font-size: 14px;
  font-weight: 600;
  color: #6D4C00;
}
.achievement-preview .ach-count {
  font-size: 12px;
  color: var(--muted);
}

/* ============================================
   Animations
   ============================================ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.4s ease forwards; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.pulse { animation: pulse 2s ease infinite; }

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 640px) {
  .header-inner { padding: 0 12px; }
  .logo { font-size: 16px; }
  .logo-sub { display: none; }
  .nav-btn { padding: 6px 10px; font-size: 12px; }
  .main-content { padding: 16px 12px 100px; }
  .dashboard-hero h1 { font-size: 22px; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 12px; }
  .stat-num { font-size: 22px; }
  .day-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 12px 16px; }
  .day-btn { padding: 8px 2px; }
  .day-num { font-size: 14px; }
  .day-label { font-size: 8px; }
  .mastery-grid { grid-template-columns: 1fr; }
  .mentor-selector { grid-template-columns: 1fr; gap: 8px; }
  .week-header { padding: 16px; flex-direction: column; align-items: flex-start; gap: 8px; }
  .week-grammars { padding: 12px 16px; }
  .content-card { padding: 18px; }
  .exercise-block { padding: 18px; }
  .mentor-chat { padding: 18px; }
  .grammar-table { font-size: 13px; }
  .grammar-table th, .grammar-table td { padding: 8px 10px; }
  .fill-input { width: 80px; }
}

@media (max-width: 480px) {
  .day-grid { grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-btn { padding: 6px 2px; }
  .day-num { font-size: 12px; }
  .day-label { display: none; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}

/* ============================================
   Utilities
   ============================================ */
.text-center { text-align: center; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-16 { margin-bottom: 16px; }
.hidden { display: none !important; }
.flex-center { display: flex; align-items: center; justify-content: center; }
</style>
</head>

</div>

<script>
// ============================================================
// DATA: Week 1 Curriculum
// ============================================================
const WEEK_DATA = {
  1: {
    title: '第1周',
    subtitle: '授受表現 &amp; 口語縮約形',
    grammarPoints: ['てくれる', 'くれるvsもらうvsあげる', 'ちゃった', 'とく'],
    days: [
      // Day 1: 〜てくれる
      {
        title: '〜てくれる — 别人为我做某事',
        type: '学习',
        content: [
          { type: 'explanation', title: '什么是「てくれる」？',
            text: '「てくれる」是一个非常重要的授受补助动词，用来表达"别人为我（或我方的人）做某事"。其核心含义是"<strong>动作朝向自己</strong>"——行动的主体是别人，受益者是我。' },
          { type: 'grammar', title: '结构',
            table: {
              headers: ['结构', '含义', '例句'],
              rows: [
                ['人が〜てくれる', '某人做某事（为我）', '友達がケーキを<span class="jp" style="color:var(--accent);font-weight:600">買ってくれた</span>。'],
                ['〜てくれますか', '能请你做某事吗？（礼貌请求）', '窓を<span class="jp" style="color:var(--accent);font-weight:600">開けてくれますか</span>。'],
                ['〜てくれない？', '帮我做一下？（口语、亲密）', 'ちょっと<span class="jp" style="color:var(--accent);font-weight:600">見てくれない</span>？'],
              ]
            }
          },
          { type: 'example', title: '更多例句',
            examples: [
              { jp: '母がセーターを編んでくれた。', cn: '妈妈给我织了毛衣。' },
              { jp: '先生が漢字の意味を説明してくれた。', cn: '老师给我解释了汉字的意思。' },
              { jp: '友達が駅まで送ってくれた。', cn: '朋友送我到车站。' },
              { jp: '彼がコーヒーをご馳走してくれた。', cn: '他请我喝了咖啡。' },
            ]
          },
          { type: 'tip', title: '💡 关键点',
            text: '「てくれる」的<strong>视角</strong>很重要：说话者永远是受益者。如果你想说"我帮别人做某事"，要用「てあげる」而不是「てくれる」。<br>日常口语中，女性常把「てくれる」说成「てくれるの？」来表达亲密和期待。' },
        ],
        exercises: [
          { id: 'd1e1', type: 'fill', desc: '填入正确的助词或动词变形',
            question: '友達が私_____（に／を／が）プレゼントを買ってくれた。',
            answer: 'に', options: ['に', 'を', 'が'],
            feedback: '「買ってくれた」前面的间接宾语用「に」标记。"朋友给我买了礼物" → 友達が私<strong>に</strong>プレゼントを買ってくれた。' },
          { id: 'd1e2', type: 'fill', desc: '填入正确的助词',
            question: '彼_____（は／が／を）ドアを開けてくれた。',
            answer: 'が', options: ['は', 'が', 'を'],
            feedback: '动作主体（谁做的）用「が」标记。强调"是他帮我开的门"。' },
          { id: 'd1e3', type: 'choice', desc: '选择最合适的句子',
            question: '你想说"朋友教我日语"，应该用哪个？',
            options: [
              { text: '友達が日本語を教えてくれた。', correct: true },
              { text: '友達が日本語を教えてあげた。', correct: false },
              { text: '友達が日本語を教えてもらった。', correct: false },
            ],
            feedback: '✅ 正确！「教えてくれた」表示朋友教我（受益者是我）。<br>❌ 「教えてあげた」是我教别人，意思相反。<br>❌ 「教えてもらった」也可以，但主语是"我"，动词是「もらう」。' },
          { id: 'd1e4', type: 'choice', desc: '选择正确的翻译',
            question: '「彼が駅まで送ってくれた。」的意思是？',
            options: [
              { text: '我送他到车站。', correct: false },
              { text: '他送我到车站。', correct: true },
              { text: '我们互相送到车站。', correct: false },
            ],
            feedback: '✅ 「送ってくれた」表示"他送我"，受益者是我。记住：<strong>てくれる = 别人为我做</strong>。' },
        ]
      },
      // Day 2: くれる vs もらう vs あげる
      {
        title: 'くれる vs もらう vs あげる — 授受动词的视角',
        type: '学习',
        content: [
          { type: 'explanation', title: '日语授受的"视角"至关重要',
            text: '日语和中文最大的不同之一：中文的"给"只有一个词，但日语要根据<strong>动作方向</strong>和<strong>受益人视角</strong>选择不同的动词。这是日语母语者的思维习惯，掌握它才能说出自然的日语。' },
          { type: 'grammar', title: '三大授受动词对比',
            table: {
              headers: ['动词', '方向', '核心含义', '例句'],
              rows: [
                ['くれる', '→ 我', '别人给我/为我做', '友達が本をくれた。'],
                ['もらう', '← 我', '我从别人那里得到', '友達に本をもらった。'],
                ['あげる', '我 →', '我给别人/为别人做', '友達に本をあげた。'],
              ]
            }
          },
          { type: 'example', title: '同一场景，三种视角',
            examples: [
              { jp: '山田さんが私に花を買って<strong>くれた</strong>。', cn: '山田给我买了花。（视角：山田→我）' },
              { jp: '私が山田さんに花を買って<strong>もらった</strong>。', cn: '我让山田给我买了花。（视角：我←山田）' },
              { jp: '私が山田さんに花を買って<strong>あげた</strong>。', cn: '我给山田买了花。（视角：我→山田）' },
            ]
          },
          { type: 'tip', title: '📌 记住这个口诀',
            text: '<strong>くれる</strong> = 别人给我（感恩）<br><strong>もらう</strong> = 我得到（请求/接受）<br><strong>あげる</strong> = 我给（付出）<br><br>💡 在日剧中，<strong>「くれる」</strong>的使用频率远高于其他两个，因为日语天然倾向于从"接受恩惠"的角度说话。' },
        ],
        exercises: [
          { id: 'd2e1', type: 'choice', desc: '选择正确的授受动词',
            question: '朋友送了我一本词典。应该怎么说？',
            options: [
              { text: '友達が辞書をくれた。', correct: true },
              { text: '友達が辞書をあげた。', correct: false },

// Generate sorted keys for greedy matching (longest first)
const WORD_BANK_KEYS = Object.keys(WORD_BANK).sort((a, b) => b.length - a.length);

// ============================================================
// FURIGANA RENDERER
// ============================================================
/**
 * Apply furigana (ruby annotations) to Japanese text.
 * Wraps known kanji words in <ruby> tags: <ruby>漢字<rt>かんじ</rt></ruby>
 * Also provides a tap-to-read feature for unknown words.
 */
function applyFurigana(text) {
  if (!text || typeof text !== 'string') return text;
  
  // Build a regex that matches any of the word bank keys
  // Escape special regex characters in the keys
  const escaped = WORD_BANK_KEYS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const pattern = new RegExp('(' + escaped.join('|') + ')', 'g');
  
  // Replace matches with ruby tags
  return text.replace(pattern, (match) => {
    const reading = WORD_BANK[match];
    if (reading) {
      return `<ruby>${match}<rt>${reading}</rt></ruby>`;
    }
    return match;
  });
}

/**
 * Apply furigana to all text content within a DOM element.
 * Used for post-processing after HTML is inserted.
 */
function applyFuriganaToDOM(container) {
  if (!container) return;
  // Process all elements with class 'jp' (Japanese text spans)
  container.querySelectorAll('.jp, .jp-example, .jp-word').forEach(el => {
    el.innerHTML = applyFurigana(el.innerHTML);
  });
}

// STATE
// ============================================================
const STORAGE_KEY = 'nihongo_mori_progress';

function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        // 兼容旧版本数据：补齐缺失字段
        if (!parsed.allGrammarPoints) parsed.allGrammarPoints = [];
        if (!parsed.grammarMastery) parsed.grammarMastery = {};
        if (!parsed.completedWeeks) parsed.completedWeeks = [];
        // 给旧的 grammarMastery 补齐 status/ weeklySnapshots
        Object.entries(parsed.grammarMastery).forEach(([name, g]) => {
          if (!g.status) g.status = 'new';
          if (!g.lastWeekScore) g.lastWeekScore = 0;
          if (!g.weeklySnapshots) g.weeklySnapshots = [];
        });
        return parsed;
      }
    } catch(e) {}
    return getDefaultState();
  }

function getDefaultState() {
  const state = {
        currentWeek: 1, currentDay: 1,
        dailyComplete: {}, dailyScores: {}, exerciseResults: {},
        grammarMastery: {},
        totalExercises: 0, totalCorrect: 0, unlockedDay: 1,
    weekComplete: false,
    selectedMentor: null,
    // 导师对话状态: { week-day: { round: 1, userAnswer: '...', mentorResponse: '...' } }
    mentorDialogue: {},
    // 所有学过的语法点列表（跨周）
    allGrammarPoints: [],
    // 已完成周数列表
    completedWeeks: [],
  };
  // Initialize grammar mastery from week 1
  if (WEEK_DATA[1]) {
    WEEK_DATA[1].grammarPoints.forEach(g => {
      state.grammarMastery[g] = { score: 0, attempts: 0, correct: 0, status: 'new', lastWeekScore: 0, weeklySnapshots: [] };
      state.allGrammarPoints.push(g);
    });
  }
  return state;
}

// 新增：三色健康状态计算
function computeStatus(score, attempts) {
  if (attempts === 0) return 'new';
  if (score >= 80 && attempts >= 3) return 'green';
  if (score >= 50) return 'yellow';
  return 'red';
}

// 新增：获取某语法点的状态标签
function getStatusLabel(name) {
  const g = state.grammarMastery[name];
  if (!g || g.status === undefined) return { cls: 'badge-new', label: '🆕 新学', color: 'var(--muted)' };
  if (g.status === 'green') return { cls: 'badge-green', label: '🟢 良好', color: 'var(--accent2)' };
  if (g.status === 'yellow') return { cls: 'badge-yellow', label: '🟡 需巩固', color: '#8B7520' };
  if (g.status === 'red') return { cls: 'badge-red', label: '🔴 需重学', color: 'var(--accent)' };
  return { cls: 'badge-new', label: '🆕 新学', color: 'var(--muted)' };
}

// 新增：获取所有红色（需重学）语法点
function getRedGrammarPoints() {
  return Object.entries(state.grammarMastery)
    .filter(([_, g]) => g.status === 'red')
    .map(([name, _]) => name);
}

// 新增：每周结束后，为所有语法点拍快照
function takeWeeklySnapshots() {
  Object.entries(state.grammarMastery).forEach(([name, g]) => {
    g.lastWeekScore = g.score;
    g.weeklySnapshots.push({
      week: state.currentWeek,
      score: g.score,
      correct: g.correct,
      total: g.attempts
    });
    g.status = computeStatus(g.score, g.attempts);
  });
  state.weekComplete = true;
  saveState();
}

let state = loadState();

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getDayKey(week, day) { return week + '-' + day; }

function isDayComplete(week, day) {
  return !!state.dailyComplete[getDayKey(week, day)];
}

function isDayUnlocked(week, day) {
  const weekData = WEEK_DATA[week];
  if (!weekData) return false;
  if (day === 1) return true;
  // Day is unlocked if previous day is complete
  return isDayComplete(week, day - 1);
}

function getDayScore(week, day) {
  return state.dailyScores[getDayKey(week, day)] || null;
}

function getGrammarMastery(name) {
  return state.grammarMastery[name] || { score: 0, attempts: 0, correct: 0 };
}

function updateGrammarMastery(name, isCorrect) {
  if (!state.grammarMastery[name]) {
    state.grammarMastery[name] = { score: 0, attempts: 0, correct: 0, status: 'new', lastWeekScore: 0, weeklySnapshots: [] };
    if (!state.allGrammarPoints.includes(name)) state.allGrammarPoints.push(name);
  }
  const g = state.grammarMastery[name];
  g.attempts++;
  if (isCorrect) g.correct++;
  g.score = Math.round((g.correct / g.attempts) * 100);
  g.status = computeStatus(g.score, g.attempts);
  saveState();
}

// Better grammar mapping by day
function getGrammarForDay(dayNum) {
  const week = WEEK_DATA[state.currentWeek];
  if (!week) return '';
  const gps = week.grammarPoints;
  if (!gps || gps.length === 0) return '';
  // Generic mapping: distribute grammar points across days
  const idx = Math.min(Math.floor((dayNum - 1) * gps.length / 7), gps.length - 1);
  return gps[idx] || gps[0];
}

function getOverallMastery() {

  // Auto-generate week data if missing (e.g. after page refresh)
  if (!WEEK_DATA[state.currentWeek]) {
    var gen = generateDefaultWeekData(state.currentWeek);
    if (gen) WEEK_DATA[state.currentWeek] = gen;
  }
  const week = WEEK_DATA[state.currentWeek];
  if (!week) {
    container.innerHTML = '<div class="fade-in" style="text-align:center;padding:60px 20px;"><h2>🎉 全部课程已完成！</h2><p style="margin-top:12px;color:var(--muted);">更多内容即将上线。</p></div>';
    return;
  }
  
  const overallMastery = getOverallMastery();
  const totalDays = week.days.length;
  const completedDays = week.days.filter((_, i) => isDayComplete(state.currentWeek, i + 1)).length;
  const isWeekComplete = completedDays >= totalDays;

  // 确定今日任务：找到第一个未完成且已解锁的天
  let todayTask = null;
  let todayDayNum = 1;
  for (let i = 0; i < week.days.length; i++) {
    const dayNum = i + 1;
    if (isDayUnlocked(state.currentWeek, dayNum) && !isDayComplete(state.currentWeek, dayNum)) {
      todayTask = week.days[i];
      todayDayNum = dayNum;
      break;
    }

  // 如果本周全部完成，检查是否需要进入下一周
  if (!todayTask && isWeekComplete) {
    const hasNextWeek = CURRICULUM.some(c => c.week === state.currentWeek + 1);

          </div>
          <div class="stat-card">
            <div class="stat-num">${state.totalExercises}</div>
            <div class="stat-label">练习总数</div>
          </div>
        </div>
      </details>

      <!-- 周导航（简化版） -->
      <div style="display:flex;justify-content:center;gap:8px;margin-bottom:20px;">
        ${CURRICULUM.map(c => {
          const isCurrent = c.week === state.currentWeek;
          const isCompleted = state.completedWeeks.includes(c.week);
          const isLocked = c.week > state.currentWeek + 1 || (c.week > state.currentWeek && !isWeekComplete);
          let bg = isCurrent ? 'var(--accent)' : isCompleted ? 'var(--accent2)' : isLocked ? 'var(--rule)' : 'var(--surface)';
          let color = (isCurrent || isCompleted) ? 'white' : isLocked ? 'var(--muted)' : 'var(--ink)';
          return `<button onclick="goToWeek(${c.week})" style="width:36px;height:36px;border-radius:50%;border:2px solid ${isLocked ? 'var(--rule)' : (isCurrent ? 'var(--accent)' : isCompleted ? 'var(--accent2)' : 'var(--rule)')};background:${bg};color:${color};font-size:14px;font-weight:700;cursor:${isLocked ? 'not-allowed' : 'pointer'};opacity:${isLocked ? '0.5' : '1'};" ${isLocked ? 'disabled' : ''}>${c.week}</button>`;
        }).join('')}
      </div>

      <!-- 调试按钮 -->
      <div style="text-align:center;margin-bottom:12px;">
        <button onclick="resetWeek3State()" style="font-size:11px;padding:4px 10px;border:1px solid var(--rule);border-radius:6px;background:var(--surface);color:var(--muted);cursor:pointer;">🔄 修复第三周</button>
      </div>
    </div>
  `;
}

// 切换视图
function switchView(viewName) {
  document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.bottom-nav-btn[data-view="${viewName}"]`);
  if (btn) btn.classList.add('active');
  render();
}

// 开始今日任务
function startTodayTask() {
  const week = WEEK_DATA[state.currentWeek];
  if (!week) return;
  
  // 找到第一个未完成的天
  for (let i = 0; i < week.days.length; i++) {
    const dayNum = i + 1;
    if (isDayUnlocked(state.currentWeek, dayNum) && !isDayComplete(state.currentWeek, dayNum)) {
      state.currentDay = dayNum;
      saveState();
      renderDay(state.currentWeek, dayNum);
      return;
    }
  }
  
  // 如果本周完成，显示进度页
  switchView('progress');
}

// ============================================================
// GRAMMAR LIBRARY PAGE
// ============================================================
function renderGrammarLibrary() {
  if (!WEEK_DATA[state.currentWeek]) {
    var gen = generateDefaultWeekData(state.currentWeek);
    if (gen) WEEK_DATA[state.currentWeek] = gen;
  }
  const week = WEEK_DATA[state.currentWeek];
  
  // 获取所有语法点（包括历史）
  const allGps = state.allGrammarPoints.length > 0 ? state.allGrammarPoints : (week ? week.grammarPoints : []);
  
  // 按健康度排序：红色 > 黄色 > 绿色 > 新学
  const sortedGps = [...allGps].sort((a, b) => {
    const statusA = getStatusLabel(a);
    const statusB = getStatusLabel(b);
    const order = { 'badge-red': 0, 'badge-yellow': 1, 'badge-green': 2, 'badge-new': 3 };
    return (order[statusA.cls] || 3) - (order[statusB.cls] || 3);
  });
  
  container.innerHTML = `
    <div class="fade-in">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">📚 ${week ? week.subtitle : ''}语法库</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px;">点击语法点开始专项练习</p>
      
      <!-- 红色提示 -->
      ${getRedGrammarPoints().length > 0 ? `
      <div style="padding:12px 16px;background:#FFEBEE;border:1px solid #EF9A9A;border-radius:var(--radius-sm);margin-bottom:16px;font-size:14px;">
        <strong style="color:var(--accent);">🔴 需要优先复习：</strong>
        <span style="color:var(--ink-soft);">${getRedGrammarPoints().join('、')}</span>
      </div>
      ` : ''}
      
      <!-- 语法列表 -->
      ${sortedGps.map(g => {
        const m = getGrammarMastery(g);
        const st = getStatusLabel(g);
        const statusIcon = st.cls === 'badge-green' ? '🟢' : st.cls === 'badge-yellow' ? '🟡' : st.cls === 'badge-red' ? '🔴' : '⚪';
        const lastPracticed = m.attempts > 0 ? `${m.correct}/${m.attempts}题正确` : '尚未练习';
        
        // 找到该语法点对应的天数
        let relatedDay = null;
        if (week && week.days) {
          for (let i = 0; i < week.days.length; i++) {
            const day = week.days[i];
            if (day.content && day.content.some(c => c.title && c.title.includes(g))) {
              relatedDay = i + 1;
              break;
            }
          }
        }
        
        return `<div class="grammar-lib-item" onclick="${relatedDay ? `startPracticeOfDay(${relatedDay})` : `switchView('dashboard')`}">
          <div class="grammar-lib-header">
            <div class="grammar-lib-name">
              <span style="width:10px;height:10px;border-radius:50%;background:${st.color};display:inline-block;"></span>
              ${g}
            </div>
            <div class="grammar-lib-status" style="color:${st.color};">
              ${statusIcon} ${st.label}
            </div>
          </div>
          <div class="grammar-lib-meta">
            上次练习: ${lastPracticed} | 正确率: ${m.score}%
          </div>
          ${st.cls !== 'badge-green' ? `<button class="grammar-lib-action">${st.cls === 'badge-red' ? '立即复习' : '开始练习'}</button>` : ''}
        </div>`;
      }).join('')}
      
      <div style="text-align:center;margin-top:20px;">
        <button onclick="switchView('dashboard')" style="padding:12px 24px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;">返回首页</button>
      </div>
    </div>
  `;
}

function startPracticeOfDay(dayNum) {
  state.currentDay = dayNum;
  saveState();
  renderDay(state.currentWeek, dayNum);
}

// ACHIEVEMENTS PAGE
// ============================================================
function renderAchievements() {
  // 计算成就
  const totalExercises = state.totalExercises || 0;
  const totalCorrect = state.totalCorrect || 0;
  const accuracy = totalExercises > 0 ? Math.round((totalCorrect / totalExercises) * 100) : 0;
  const completedWeeks = state.completedWeeks ? state.completedWeeks.length : 0;
  
  // 计算连续学习天数
  let streakDays = 0;
  for (let w = state.currentWeek; w >= 1; w--) {
    const wData = WEEK_DATA[w];
    if (!wData) break;
    let foundBreak = false;
    for (let d = wData.days.length; d >= 1; d--) {
      if (isDayComplete(w, d)) {
        streakDays++;
      } else if (w === state.currentWeek) {
        // 当前周的未完成天不算中断
      } else {
        foundBreak = true;
        break;
      }
    }
    if (foundBreak) break;
  }
  
  // 获取已掌握语法点数量
  const masteredCount = Object.values(state.grammarMastery || {}).filter(g => g.status === 'green').length;
  const totalGrammar = state.allGrammarPoints ? state.allGrammarPoints.length : 0;
  
  // 成就列表
  const achievements = [
    { id: 'first_day', name: '初入森林', desc: '完成第一天学习', icon: '🌱', unlocked: totalExercises > 0 },
    { id: 'streak_3', name: '三日坚持', desc: '连续学习3天', icon: '🔥', unlocked: streakDays >= 3 },
    { id: 'streak_7', name: '一周达人', desc: '连续学习7天', icon: '💪', unlocked: streakDays >= 7 },
    { id: 'week_complete', name: '周冠军', desc: '完成一周课程', icon: '🏆', unlocked: completedWeeks >= 1 },
    { id: 'accuracy_80', name: '精准射手', desc: '正确率达到80%', icon: '🎯', unlocked: accuracy >= 80 },
    { id: 'exercises_50', name: '练习达人', desc: '完成50道练习题', icon: '📝', unlocked: totalExercises >= 50 },
    { id: 'exercises_100', name: '题海战士', desc: '完成100道练习题', icon: '📚', unlocked: totalExercises >= 100 },
    { id: 'mastered_3', name: '语法新星', desc: '掌握3个语法点', icon: '⭐', unlocked: masteredCount >= 3 },
    { id: 'mastered_all', name: '语法大师', desc: '掌握所有语法点', icon: '👑', unlocked: masteredCount >= totalGrammar && totalGrammar > 0 },
  ];
  
  const unlockedCount = achievements.filter(a => a.unlocked).length;
  
  container.innerHTML = `
    <div class="fade-in">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">🏆 我的成就</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px;">已解锁 ${unlockedCount}/${achievements.length} 个成就</p>
      
      <!-- 成就统计卡片 -->
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;">
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:16px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:var(--accent);">${totalExercises}</div>
          <div style="font-size:12px;color:var(--muted);">总练习数</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:16px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:var(--accent2);">${accuracy}%</div>
          <div style="font-size:12px;color:var(--muted);">正确率</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:16px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:var(--gold);">${streakDays}</div>
          <div style="font-size:12px;color:var(--muted);">连续学习天数</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:16px;text-align:center;">
          <div style="font-size:28px;font-weight:700;color:var(--accent);">${masteredCount}/${totalGrammar}</div>
          <div style="font-size:12px;color:var(--muted);">已掌握语法</div>
        </div>
      </div>
      
      <!-- 成就列表 -->
      <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">🎖️ 成就墙</h3>
      <div style="display:grid;gap:12px;">
        ${achievements.map(a => `
          <div style="display:flex;align-items:center;gap:14px;padding:16px;background:${a.unlocked ? 'var(--gold-glow)' : 'var(--surface)'};border:1px solid ${a.unlocked ? 'var(--gold)' : 'var(--rule)'};border-radius:var(--radius-sm);opacity:${a.unlocked ? '1' : '0.6'};">
            <div style="font-size:32px;filter:${a.unlocked ? 'none' : 'grayscale(100%)'};">${a.icon}</div>
            <div style="flex:1;">
              <div style="font-size:15px;font-weight:600;color:${a.unlocked ? '#6D4C00' : 'var(--muted)'};">${a.name}</div>

      </div>
    </div>
  `;
}

function renderDay(weekNum, dayNum) {
  try {
  const week = WEEK_DATA[weekNum];
  if (!week) { render(); return; }
  const day = week.days[dayNum - 1];
  if (!day) { render(); return; }

  const isComplete = isDayComplete(weekNum, dayNum);
  const isLastDay = dayNum === week.days.length;
  const isTest = day.type === '测试';

  // Build content
  let contentHtml = '';

  // Memory sentence (每日背诵)
   var memorySentence = getMemorySentenceForDay(weekNum, dayNum);
   if (memorySentence) {
     contentHtml += `<div class="memory-card">
       <div class="memory-label">📖 今日の暗唱</div>
       <div class="memory-jp">${applyFurigana(memorySentence.jp)}</div>
       <div class="memory-hint" onclick="this.nextElementSibling.classList.toggle('show');this.style.display='none';">👆 点击查看翻译</div>
       <div class="memory-trans">${memorySentence.cn}</div>
       <div class="memory-mnemonic" id="mnemonic-${weekNum}-${dayNum}">
         <strong>💡 记忆小窍门</strong><br>
         ${memorySentence.mnemonic}
       </div>
     </div>`;
   }

  day.content.forEach((c, i) => {
    if (c.type === 'explanation') {
      contentHtml += `<div class="content-card">
        <h3>${applyFurigana(c.title)}</h3>
        <p>${applyFurigana(c.text)}</p>
      </div>`;
    } else if (c.type === 'grammar' && c.table) {
      contentHtml += `<div class="content-card">
        <h3>${applyFurigana(c.title)}</h3>
        <table class="grammar-table">
          <thead><tr>${c.table.headers.map(h => `<th>${applyFurigana(h)}</th>`).join('')}</tr></thead>
          <tbody>${c.table.rows.map(r => `<tr>${r.map(cell => `<td>${applyFurigana(cell)}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;
    } else if (c.type === 'example' && c.examples) {
      contentHtml += `<div class="content-card">
        <h3>${applyFurigana(c.title)}</h3>
        ${c.examples.map(e => `<div class="example">
          <div class="jp">${applyFurigana(e.jp)}</div>
          <div class="trans">${e.cn}</div>
        </div>`).join('')}
      </div>`;
    } else if (c.type === 'tip') {
      contentHtml += `<div class="content-card">
        <div class="tip-box">${applyFurigana(c.text)}</div>
      </div>`;
    }
  });

  // Build exercises
  let exercisesHtml = '';
  day.exercises.forEach((ex, i) => {
    exercisesHtml += renderExercise(weekNum, dayNum, ex, i);
  });

  // Mentor selector (所有天都显示，选择导师后练习自动获得反馈)
  let mentorSection = '';
  const selectedId = state.selectedMentor || 'tanaka';
  mentorSection = `
    <div class="mentor-selector">
      ${Object.values(MENTORS).map(m => `
        <div class="mentor-card ${m.id === selectedId ? 'selected' : ''}" data-mentor="${m.id}">
          <div class="mentor-avatar ${m.id}">${m.id === 'tanaka' ? '田' : m.id === 'sato' ? '佐' : '林'}</div>
          <div class="mentor-name">${m.name}</div>
          <div class="mentor-style">${m.title}</div>
        </div>
      `).join('')}
    </div>
    <div class="mentor-chat" id="mentorChat">
      <div class="mentor-msg">
        <div class="mini-avatar ${selectedId}">${selectedId === 'tanaka' ? '田' : selectedId === 'sato' ? '佐' : '林'}</div>
        <div class="bubble">${applyFurigana(MENTORS[selectedId].greeting)}</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:12px;">
      <button class="submit-btn" onclick="startMentorDialogue(${weekNum}, ${dayNum})" style="background:var(--accent2);width:100%;padding:12px;">
        🎯 导师提问：今天学的内容，试试回答！
      </button>
    </div>
    <div class="mentor-dialogue-input" id="mentorDialogueInput" style="display:none;"></div>
  `;

  // Completion banner
  let completionHtml = '';
  if (isComplete && isLastDay) {
    const score = getDayScore(weekNum, dayNum);
    const hasNext = CURRICULUM.some(c => c.week === weekNum + 1);
    completionHtml = `<div class="completion-banner">
      <h3>🎉 第${weekNum}周完成！</h3>
      <p>测试得分：${score ? score.correct + '/' + score.total : '已完成'} | 整体掌握度：${getOverallMastery()}%</p>
      ${hasNext ? `<button class="next-week-btn" style="margin-top:10px;padding:10px 24px;font-size:15px;" onclick="goToNextWeek()">▶ 进入第${weekNum + 1}周</button>` : ''}
      <p style="margin-top:8px;font-size:13px;color:var(--muted)">${hasNext ? '下周继续加油！' : '恭喜完成全部课程！'}新しい文法をマスターしよう！</p>
    </div>`;
  } else if (isComplete) {
    completionHtml = `<div class="completion-banner" style="border-color:var(--accent2);background:var(--accent2-glow)">
      <h3>✅ Day ${dayNum} 完成！</h3>
      <p>继续解锁下一天 →</p>
    </div>`;
  }

  container.innerHTML = `
    <div class="day-view active fade-in">
      <div class="day-header">
        <button class="day-back-btn" id="backToDashboard">←</button>
        <div class="day-header-info">
          <h2>${week.title} · Day ${dayNum}：${day.title}</h2>
          <p>${isComplete ? '✅ 已完成' : (isTest ? '📝 10道题，80%通过' : '完成所有练习以解锁下一天')}</p>
        </div>
      </div>

      ${completionHtml}

      ${!isComplete ? contentHtml : ''}
      ${!isComplete ? mentorSection : ''}
      ${!isComplete ? exercisesHtml : ''}

      ${isComplete && !isLastDay ? `<div style="text-align:center;margin-top:20px">
        <button class="submit-btn" onclick="goToNextDay()">进入 Day ${dayNum + 1} →</button>
      </div>` : ''}

      ${isComplete ? `
        <button class="review-toggle" onclick="this.classList.toggle('open');document.getElementById('reviewContent').classList.toggle('open');">
          📖 回顾本日内容
        </button>
        <div class="review-content" id="reviewContent">
          ${contentHtml}
          ${mentorSection}
          <div class="review-exercises">${exercisesHtml}</div>
        </div>
      ` : ''}
    </div>
  `;

  // Bind back button
  document.getElementById('backToDashboard').addEventListener('click', () => {
    document.querySelector('[data-view="dashboard"]').click();
  });

  // Bind mentor selector (所有天都生效)
  container.querySelectorAll('.mentor-card').forEach(card => {
    card.addEventListener('click', () => {
      container.querySelectorAll('.mentor-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.selectedMentor = card.dataset.mentor;
      // 切换导师时重置当天的对话状态
      const key = weekNum + '-' + dayNum;
      if (state.mentorDialogue && state.mentorDialogue[key]) {
        delete state.mentorDialogue[key];
      }
      saveState();
      const mentor = MENTORS[card.dataset.mentor];
      document.getElementById('mentorChat').innerHTML = `
        <div class="mentor-msg">
          <div class="mini-avatar ${mentor.id}">${mentor.id === 'tanaka' ? '田' : mentor.id === 'sato' ? '佐' : '林'}</div>
          <div class="bubble">${applyFurigana(mentor.greeting)}</div>
        </div>`;
      // 隐藏对话输入区
      const inputArea = document.getElementById('mentorDialogueInput');
      if (inputArea) {
        inputArea.style.display = 'none';
        inputArea.innerHTML = '';
      }
    });
  });

  // Bind exercise listeners
  bindExerciseListeners(weekNum, dayNum, day.exercises);
  } catch(e) {
    lastPageErrors.push('renderDay error: ' + e.message);
    container.innerHTML = '<div class="fade-in" style="padding:40px 20px;text-align:center;"><h3>⚠️ 渲染错误</h3><p style="color:var(--accent);margin-top:12px;">' + e.message + '</p><button class="submit-btn" onclick="render()" style="margin-top:16px;">返回主页</button></div>';
  }
}

function renderExercise(weekNum, dayNum, ex, index) {
  if (ex.type === 'fill') {
    return `<div class="exercise-block" data-exid="${ex.id}">
      <h3>練習 ${index + 1}</h3>
      <div class="exercise-desc">${applyFurigana(ex.desc)}</div>
      <div class="fill-group">
        <div class="fill-label">${applyFurigana(ex.question)}</div>
        <div class="fill-row">
          <input type="text" class="fill-input" data-answer="${ex.answer}" placeholder="输入答案" autocomplete="off">
          <button class="submit-btn" onclick="checkFill(this)">检查</button>
        </div>
      </div>
      <div class="exercise-feedback" id="fb-${ex.id}"></div>
    </div>`;
  } else if (ex.type === 'choice') {
    return `<div class="exercise-block" data-exid="${ex.id}">
      <h3>練習 ${index + 1}</h3>
      <div class="exercise-desc">${applyFurigana(ex.desc)}</div>
      <div class="fill-label">${applyFurigana(ex.question)}</div>
      <div class="choice-group" data-answer="${ex.options.find(o => o.correct).text}" data-exid="${ex.id}">
        ${ex.options.map((o, oi) => `<button class="choice-btn" data-correct="${o.correct}">${String.fromCharCode(65 + oi)}. ${applyFurigana(o.text)}</button>`).join('')}
      </div>
      <div class="exercise-feedback" id="fb-${ex.id}"></div>
    </div>`;
  } else if (ex.type === 'writing') {
    return `<div class="exercise-block" data-exid="${ex.id}">
      <h3>✍️ 書き練習</h3>
      <div class="exercise-desc">${applyFurigana(ex.desc)}</div>
      <div class="fill-label">${applyFurigana(ex.question)}</div>
      <textarea class="writing-area" placeholder="ここに日本語で書いてください..." data-exid="${ex.id}"></textarea>
      <div class="writing-hint">至少写一个完整的句子。尽量使用本周学到的语法点。</div>
      <button class="submit-btn" onclick="submitWriting(this)">提交给导师批改</button>
      <div class="exercise-feedback" id="fb-${ex.id}"></div>
    </div>`;
  }
  return '';
}

// ============================================================
// EXERCISE ENGINE
// ============================================================
function checkFill(btn) {
  const input = btn.previousElementSibling;
  const answer = input.dataset.answer.trim().toLowerCase();
  const userVal = input.value.trim().toLowerCase();
  const fb = input.closest('.exercise-block').querySelector('.exercise-feedback');
  const exId = input.closest('.exercise-block').dataset.exid;

  // Find the exercise data
  const week = WEEK_DATA[state.currentWeek];
  const day = week.days[state.currentDay - 1];
  const ex = day.exercises.find(e => e.id === exId);

  if (!userVal) {
    fb.className = 'exercise-feedback show incorrect';
    fb.innerHTML = '<div class="fb-title">⚠️ 请输入答案</div>';
    return;
  }

  const isCorrect = userVal === answer || userVal.includes(answer);
  input.classList.add(isCorrect ? 'correct' : 'incorrect');
  input.disabled = true;
  btn.disabled = true;

  // Update state
  state.totalExercises++;
  if (isCorrect) state.totalCorrect++;
  saveState();

  // Update grammar mastery
  const grammarName = getGrammarForDay(state.currentDay);
  if (grammarName) updateGrammarMastery(grammarName, isCorrect);

  fb.className = `exercise-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
  fb.innerHTML = isCorrect
    ? `<div class="fb-title">✅ 正解！</div><div class="fb-detail">${applyFurigana(ex.feedback)}</div>`
    : `<div class="fb-title">❌ 不正解</div><div class="fb-detail">正解は「${applyFurigana(ex.answer)}」です。<br>${applyFurigana(ex.feedback)}</div>`;

  // 导师反馈（选择导师后所有天都生效）
  const grammarStatus = grammarName ? state.grammarMastery[grammarName] : null;
  if (state.selectedMentor) {
    const mentor = MENTORS[state.selectedMentor];
    if (mentor) {
      const fbData = mentor.getFeedback(ex, isCorrect, userVal, grammarStatus);
      appendMentorMessage(state.selectedMentor, fbData.msg, fbData.point);
    }
  }

  // Check if all exercises in this day are done
  checkDayComplete(state.currentWeek, state.currentDay);
}

function checkChoice(btn) {
  const group = btn.closest('.choice-group');
  const exId = group.dataset.exid;
  const fb = document.getElementById('fb-' + exId);
  const btns = group.querySelectorAll('.choice-btn');
  const isCorrect = btn.dataset.correct === 'true';

  // Lock all buttons
  btns.forEach(b => {
    b.classList.add('disabled');
    if (b.dataset.correct === 'true') b.classList.add('correct');
    if (b === btn && !isCorrect) b.classList.add('incorrect');
  });

  // Update state
  state.totalExercises++;
  if (isCorrect) state.totalCorrect++;
  saveState();

  // Update grammar mastery
  const week = WEEK_DATA[state.currentWeek];
  const day = week.days[state.currentDay - 1];
  const ex = day.exercises.find(e => e.id === exId);
  const grammarName = getGrammarForDay(state.currentDay);
  if (grammarName) updateGrammarMastery(grammarName, isCorrect);

  fb.className = `exercise-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
  fb.innerHTML = isCorrect
    ? `<div class="fb-title">✅ 正解！</div><div class="fb-detail">${applyFurigana(ex.feedback)}</div>`
    : `<div class="fb-title">❌ 不正解</div><div class="fb-detail">${applyFurigana(ex.feedback)}</div>`;

  // 导师反馈（选择导师后所有天都生效）
  const grammarStatus = grammarName ? state.grammarMastery[grammarName] : null;
  if (state.selectedMentor) {
    const mentor = MENTORS[state.selectedMentor];
    if (mentor) {
      const correctText = ex.options.find(o => o.correct).text;
      const userChoice = btn.textContent.replace(/^[A-Z]\.\s*/, '');
      // Create a fake exercise object with answer for mentor feedback
      const exForMentor = Object.assign({}, ex, { answer: correctText });
      const fbData = mentor.getFeedback(exForMentor, isCorrect, userChoice, grammarStatus);
      appendMentorMessage(state.selectedMentor, fbData.msg, fbData.point);
    }
  }

  checkDayComplete(state.currentWeek, state.currentDay);
}

function submitWriting(btn) {
  const block = btn.closest('.exercise-block');
  const textarea = block.querySelector('.writing-area');
  const fb = block.querySelector('.exercise-feedback');
  const text = textarea.value.trim();

  if (!text) {
    fb.className = 'exercise-feedback show incorrect';
    fb.innerHTML = '<div class="fb-title">⚠️ 请先写一句话</div>';
    return;
  }

  // Simple check: does it contain any of the week's grammar points?
  const week = WEEK_DATA[state.currentWeek];
  const hasGrammar = week.grammarPoints.some(g => text.includes(g.replace('vs', '').split('vs')[0]));

  state.totalExercises++;
  if (hasGrammar) state.totalCorrect++;
  saveState();

  if (hasGrammar) {
    updateGrammarMastery(getGrammarForDay(state.currentDay), true);
  }

  fb.className = `exercise-feedback show ${hasGrammar ? 'correct' : 'partial'}`;
  fb.innerHTML = hasGrammar
    ? `<div class="fb-title">✅ 提出完了！</div><div class="fb-detail">你的句子使用了本周的语法点，很棒！<br>继续练习，让这些表达变成你的本能反应。</div>`
    : `<div class="fb-title">💡 建议</div><div class="fb-detail">你的句子没有用到本周的语法点（てくれる、ちゃった、とく等）。<br>试试用上这些语法重新写一句？</div>`;

  textarea.disabled = true;
  btn.disabled = true;

  // Mentor feedback for writing
  if (state.selectedMentor) {
    appendMentorMessage(state.selectedMentor,
      hasGrammar
        ? 'いい文章だ！「' + text.substring(0, 20) + '…」の書き方が自然だね。文法をしっかり使えている。'
        : '文章は書けたが、今週の文法ポイントを使ってみよう。「てくれる」「ちゃった」「とく」のどれかを入れて書き直してみて。',
      hasGrammar
        ? 'この調子で毎日書くことが上達の近道だ。'
        : '目標は「知っている」から「使える」になることだ。'
    );
  }

  checkDayComplete(state.currentWeek, state.currentDay);
}

function checkDayComplete(weekNum, dayNum) {
  const day = WEEK_DATA[weekNum].days[dayNum - 1];
  const blocks = document.querySelectorAll(`.exercise-block`);
  let allDone = true;
  let totalEx = 0;
  let correctEx = 0;

  blocks.forEach(block => {
    const exId = block.dataset.exid;
    const ex = day.exercises.find(e => e.id === exId);
    if (!ex) return;
    totalEx++;

    // Check if this exercise is answered
    if (ex.type === 'fill') {
      const input = block.querySelector('.fill-input');
      if (!input || !input.disabled) allDone = false;
      else if (input.classList.contains('correct')) correctEx++;
    } else if (ex.type === 'choice') {
      const btns = block.querySelectorAll('.choice-btn');
      const anyDisabled = Array.from(btns).some(b => b.classList.contains('disabled'));
      if (!anyDisabled) allDone = false;
      else {
        btns.forEach(b => {
          if (b.dataset.correct === 'true' && b.classList.contains('disabled')) correctEx++;
        });
      }
    } else if (ex.type === 'writing') {
      const ta = block.querySelector('.writing-area');
      if (!ta || !ta.disabled) allDone = false;
      else correctEx++;
    }
  });

  if (allDone && totalEx > 0) {
    const key = getDayKey(weekNum, dayNum);
    state.dailyComplete[key] = true;
    state.dailyScores[key] = { correct: correctEx, total: totalEx };
    saveState();

    // Show completion message
    const header = document.querySelector('.day-header-info p');
    if (header) header.textContent = '✅ 已完成！';

    // Special handling for test day (Day 7)
    if (day.type === '测试' && totalEx > 0) {
      const pct = Math.round((correctEx / totalEx) * 100);
      const passed = pct >= 80;
      // 拍快照
      takeWeeklySnapshots();

      // 构建各语法点详情
      let grammarDetails = '';
      const redPoints = getRedGrammarPoints();
      Object.entries(state.grammarMastery)
        .sort((a, b) => {
          const order = { red: 0, yellow: 1, green: 2, new: 3 };
          return (order[a[1].status] || 0) - (order[b[1].status] || 0);
        })
        .forEach(([name, data]) => {
          const st = getStatusLabel(name);
          const change = data.lastWeekScore > 0
            ? `<span style="color:${data.score >= data.lastWeekScore ? 'var(--accent2)' : 'var(--accent)'};font-size:12px;">
                ${data.score >= data.lastWeekScore ? '↑' : '↓'} ${data.lastWeekScore}%→${data.score}%
              </span>`
            : '<span style="color:var(--muted);font-size:12px;">本周新学</span>';
          grammarDetails += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--rule);">
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="width:8px;height:8px;border-radius:50%;background:${st.color};display:inline-block;"></span>
              <strong>${name}</strong>
              <span style="font-size:12px;color:${st.color};">${st.label}</span>
            </div>
            <div style="text-align:right;">
              <div style="font-weight:600;font-size:15px;">${data.score}%</div>
              <div>${change}</div>
            </div>
          </div>`;
        });

      const scoreHtml = `
        <div class="test-score fade-in" style="margin-top:24px;">
          <div class="score-circle ${passed ? 'pass' : 'fail'}" style="width:120px;height:120px;font-size:32px;border-width:4px;">${pct}%</div>
          <div class="score-label">${correctEx}/${totalEx} 正确</div>
          <div class="score-result" style="color:${passed ? 'var(--accent2)' : 'var(--accent)'};font-size:16px;">
            ${passed ? '🎉 合格！本周语法点已初步掌握！' : '📚 未达标（80%），下周继续巩固'}
          </div>

          ${redPoints.length > 0 ? `<div style="margin-top:16px;padding:12px 16px;background:#FFEBEE;border:1px solid #EF9A9A;border-radius:8px;text-align:left;font-size:14px;">
            <div style="font-weight:600;color:var(--accent);">🔴 ${redPoints.length} 个语法点需要优先复习</div>
            <div style="color:var(--ink-soft);margin-top:4px;">${redPoints.join('、')}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">下周会自动安排这些语法点的复习</div>
          </div>` : ''}

          <div style="margin-top:16px;background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;">
            <div style="padding:10px 16px;background:var(--surface);font-weight:600;font-size:14px;border-bottom:1px solid var(--rule);">📊 各语法点掌握度（红色=需复习）</div>
            ${grammarDetails}
          </div>

          <div style="margin-top:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <button class="submit-btn" onclick="render()">返回主页</button>
            ${CURRICULUM.some(c => c.week === weekNum + 1) ? `<button class="submit-btn" style="background:var(--accent2);" onclick="goToNextWeek()">▶ 进入第${weekNum + 1}周</button>` : ''}
          </div>
        </div>`;

      const existingDayView = document.querySelector('.day-view');
      if (existingDayView) {
        existingDayView.insertAdjacentHTML('beforeend', scoreHtml);
      }
      return;
    }

    // Auto-navigate to next day if not last day
    if (dayNum < WEEK_DATA[weekNum].days.length) {
      setTimeout(() => {
        if (confirm('🎉 本日练习完成！' + (correctEx === totalEx ? '全对，太棒了！' : `${correctEx}/${totalEx} 正确`) + '\n进入下一天？')) {
          goToNextDay();
        }
      }, 500);
    } else {
      // Week complete!
      state.weekComplete = true;
      saveState();
      setTimeout(() => {
        render();
      }, 300);
    }
  }
}

function goToNextDay() {
  state.currentDay++;
  saveState();
  renderDay(state.currentWeek, state.currentDay);
}

// ============================================================
// WEEK PROGRESSION
// ============================================================

/**
 * Auto-generate default week data for any week defined in CURRICULUM
 * but not yet populated in WEEK_DATA.
 */
function generateDefaultWeekData(weekNum) {
  const curriculum = CURRICULUM.find(c => c.week === weekNum);
  if (!curriculum) return null;

  var gps = curriculum.grammarPoints;
  var days = [];

  // 常用日语例句库，用于自动生成时提供真实例句
  var SAMPLE_EXAMPLES = {
    'fill': [
      { q: '将这个句子翻译成日语："我吃了寿司。"', a: '寿司を食べました。', fb: '「寿司を食べました」= 吃了寿司。注意「を」标记宾语。' },
      { q: '将这个句子翻译成日语："明天去学校。"', a: '明日学校へ行きます。', fb: '「明日学校へ行きます」= 明天去学校。注意「へ」表示方向。' },
      { q: '将这个句子翻译成日语："这本书很有趣。"', a: 'この本は面白いです。', fb: '「この本は面白いです」= 这本书很有趣。注意「は」标记主题。' },
      { q: '将这个句子翻译成日语："一起学习吧。"', a: '一緒に勉強しましょう。', fb: '「一緒に勉強しましょう」= 一起学习吧。注意「ましょう」表示提议。' },
    ],
    'choice': [
      { q: '以下哪个是日语中表示"但是"的接续词？', opts: 'そして｜しかし｜だから｜それで', correct: 1, fb: '「しかし」= 但是（逆接）。「そして」= 然后（顺接）。「だから」= 所以（因果）。' },
      { q: '日语中"很美味"怎么说？', opts: '美味しいです｜美味しくないです｜美味しかったです｜美味しいでした', correct: 0, fb: '「美味しいです」= 很美味（现在肯定）。「美味しかったです」= 很好吃（过去）。' },
      { q: '「〜てください」是什么用法？', opts: '请求/命令别人做某事｜描述过去的事情｜表示能力｜表示推测', correct: 0, fb: '「〜てください」= 请做某事，是礼貌的请求/命令表达。' },
      { q: '「私は学生です」的正确否定形式是？', opts: '私は学生ではありません｜私は学生ですない｜私は学生くないです｜私は学生じゃありませんです', correct: 0, fb: '「学生です」的否定是「学生ではありません」或口语「学生じゃないです」。' },
    ]
  };

  // Helper: create a better exercise for a grammar point
  function makeEx(gp, type, idx) {
    var sampleIdx = (days.length + idx) % 4;
    if (type === 'fill') {
      var s = SAMPLE_EXAMPLES.fill[sampleIdx];
      var id = 'gen-w' + weekNum + '-d' + (idx + 1) + '-ex' + (days.length + 1);
      return { id: id, type: 'fill', desc: '翻译练习（结合「' + gp + '」的语境）', question: s.q, answer: s.a, feedback: s.fb + '<br>💡 本周语法点「' + gp + '」也试着在答案中使用吧。' };
    }
    if (type === 'choice') {
      var s = SAMPLE_EXAMPLES.choice[sampleIdx];
      var opts = s.opts.split('｜');
      var id = 'gen-w' + weekNum + '-d' + (idx + 1) + '-ex' + (days.length + 2);
      return {
        id: id, type: 'choice', desc: '日语基础练习（结合「' + gp + '」的学习）',
        question: s.q,
        options: opts.map(function(t, oi) { return { text: t, correct: oi === s.correct }; }),
        feedback: s.fb + '<br>💡 本周学习的「' + gp + '」也是重要语法点，请注意区分。'
      };
    }
    return null;
  }

  // Helper: create explanation + table + examples for a grammar point
  function makeContent(gp, idx) {
    return [
      { type: 'explanation', title: '「' + gp + '」的核心用法',
        text: '「' + gp + '」是第' + weekNum + '周的重要语法点。掌握它对于理解日常会话和日剧非常有帮助。请参考教材或词典详细了解这个语法点的变形规则和用法。<br><br>📌 学习建议：<br>• 先理解这个语法点的<strong>核心含义</strong><br>• 记住<strong>变形规则</strong>（如有）<br>• 通过<strong>大量例句</strong>来巩固理解' },
      { type: 'grammar', title: '「' + gp + '」的基本信息',
        table: {
          headers: ['项目', '内容'],
          rows: [
            ['语法点', gp],
            ['所属周', '第' + weekNum + '周 - ' + curriculum.title + '：' + curriculum.subtitle],
            ['学习建议', '查阅教材或词典，结合例句理解用法'],
          ]
        }
      },
      { type: 'example', title: '参考例句',
        examples: [
          { jp: 'これは' + gp + 'の例です。', cn: '这是「' + gp + '」的例子。' },
          { jp: gp + 'を勉強しましょう。', cn: '我们来学习「' + gp + '」吧。' },
          { jp: 'もう一度' + gp + 'を復習しましょう。', cn: '再复习一次「' + gp + '」吧。' },
        ]
      },
      { type: 'tip', text: '💡 提示：自动生成的内容为占位资料。为了更好的学习体验，建议在应用设置中为本周手动创建高质量的课程数据。' },
    ];
  }

  // Generate days based on grammar points
  for (var i = 0; i < 7; i++) {
    var dayNum = i + 1;
    var day = { title: '', type: '', content: [], exercises: [] };

    if (dayNum === 1 && gps.length >= 1) {
      day.title = '「' + gps[0] + '」—— 基础用法';
      day.type = '学习';
      day.content = makeContent(gps[0], 0);
      day.exercises = [makeEx(gps[0], 'fill', 0), makeEx(gps[0], 'choice', 0)].filter(Boolean);
    }
    else if (dayNum === 2 && gps.length >= 2) {
      day.title = '「' + gps[1] + '」—— 深入理解';
      day.type = '学习';
      day.content = makeContent(gps[1], 1);
      day.exercises = [makeEx(gps[1], 'fill', 1), makeEx(gps[1], 'choice', 1)].filter(Boolean);
    }
    else if (dayNum === 3) {
      day.title = '复习：' + (gps.length >= 2 ? gps[0] + ' & ' + gps[1] : gps[0]);
      day.type = '复习';
      day.content = [
        { type: 'explanation', title: '复习与巩固',
          text: '今天复习前两天学过的内容。导师会帮助你检查掌握情况。' },
        { type: 'tip', text: '复习时注意比较不同语法点的区别，混淆的地方重点标记。' },
      ];
      for (var j = 0; j < Math.min(2, gps.length); j++) {
        day.exercises.push(makeEx(gps[j], 'fill', j));
        day.exercises.push(makeEx(gps[j], 'choice', j));
      }
    }
    else if (dayNum === 4 && gps.length >= 3) {
      day.title = '「' + gps[2] + '」—— 应用练习';
      day.type = '学习';
      day.content = makeContent(gps[2], 2);
      day.exercises = [makeEx(gps[2], 'fill', 2), makeEx(gps[2], 'choice', 2)].filter(Boolean);
    }
    else if (dayNum === 5 && gps.length >= 4) {
      day.title = '「' + gps[3] + '」—— 综合运用';
      day.type = '学习';
      day.content = makeContent(gps[3], 3);
      day.exercises = [makeEx(gps[3], 'fill', 3), makeEx(gps[3], 'choice', 3)].filter(Boolean);
    }
    else if (dayNum === 6) {
      day.title = '实战对话';
      day.type = '对话';
      day.content = [
        { type: 'explanation', title: '实战练习',
          text: '今天和导师进行对话练习，运用本周学到的所有语法点。' },
        { type: 'example', title: '参考对话',
          examples: [
            { jp: 'A: 今週の' + gps[0] + 'を復習しましたか？', cn: 'A: 你复习了这周的' + gps[0] + '吗？' },
            { jp: 'B: はい、' + (gps.length > 1 ? gps[1] + 'も' : '') + '練習しました。', cn: 'B: 是的，也练习了' + (gps.length > 1 ? gps[1] : '') + '。' },
          ]
        },
      ];
      for (var k = 0; k < Math.min(2, gps.length); k++) {
        day.exercises.push(makeEx(gps[k], 'choice', k));
      }
    }
    else if (dayNum === 7) {
      day.title = '第' + weekNum + '周测试';
      day.type = '测试';
      day.content = [
        { type: 'explanation', title: '本周测试',
          text: '完成以下题目，测试你对本周语法点的掌握情况。' },
      ];
      for (var m = 0; m < gps.length; m++) {
        day.exercises.push(makeEx(gps[m], 'fill', m));
        day.exercises.push(makeEx(gps[m], 'choice', m));
      }
    }
    else {
      // Fallback for any missing days
      day.title = '练习日';
      day.type = '练习';
      day.content = [
        { type: 'explanation', title: '综合练习',
          text: '今天继续练习本周围绕的语法点。' },
      ];
      for (var n = 0; n < Math.min(2, gps.length); n++) {
        day.exercises.push(makeEx(gps[n], 'choice', n));
      }
    }

    days.push(day);
  }

  return {
    title: curriculum.title,
    subtitle: curriculum.subtitle,
    grammarPoints: gps,
    days: days
  };
}

function goToNextWeek() {
  var nextWeek = state.currentWeek + 1;
  var curriculum = CURRICULUM.find(function(c) { return c.week === nextWeek; });
  if (!curriculum) {
    alert('🎉 恭喜你完成了全部 ' + state.currentWeek + ' 周的课程！更多内容开发中。');
    render();
    return;
  }

  // Auto-generate week data if not yet created
  if (!WEEK_DATA[nextWeek] && curriculum) {
    var generated = generateDefaultWeekData(nextWeek);
    if (generated) {
      WEEK_DATA[nextWeek] = generated;
    } else {
      alert('⚠️ 第' + nextWeek + '周课程数据生成失败，请重试。');
      return;
    }
  }

  // Take snapshot of current week before moving on
  if (!state.weekComplete) {
    takeWeeklySnapshots();
  }

  // Mark current week as completed
  if (!state.completedWeeks.includes(state.currentWeek)) {
    state.completedWeeks.push(state.currentWeek);
  }

  // Push new grammar points from next week
  const nextWeekData = WEEK_DATA[nextWeek];
  if (nextWeekData && nextWeekData.grammarPoints) {
    nextWeekData.grammarPoints.forEach(g => {
      if (!state.grammarMastery[g]) {
        state.grammarMastery[g] = { score: 0, attempts: 0, correct: 0, status: 'new', lastWeekScore: 0, weeklySnapshots: [] };
        if (!state.allGrammarPoints.includes(g)) {
          state.allGrammarPoints.push(g);
        }
      }
    });
  }

  // Reset week state
  state.currentWeek = nextWeek;
  state.currentDay = 1;
  state.unlockedDay = 1;
  state.weekComplete = false;
  saveState();
  render();
}

function goToWeek(weekNum) {
  if (weekNum < 1 || weekNum > state.currentWeek + 1) return;
  if (weekNum > state.currentWeek) {
    goToNextWeek();
    return;
  }
  state.currentWeek = weekNum;
  state.currentDay = 1;
  state.unlockedDay = 1;
  saveState();
  render();
}

function bindExerciseListeners(weekNum, dayNum, exercises) {
  // Choice buttons
  document.querySelectorAll('.choice-group .choice-btn:not(.disabled)').forEach(btn => {
    btn.addEventListener('click', () => checkChoice(btn));
  });

  // Fill input enter key
  document.querySelectorAll('.fill-input').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const btn = inp.nextElementSibling;
        if (btn && btn.classList.contains('submit-btn')) btn.click();
      }
    });
  });
}

// ============================================================
// PROGRESS VIEW
// ============================================================
function renderProgress() {
  // Auto-generate week data if missing (e.g. after page refresh)
  if (!WEEK_DATA[state.currentWeek]) {
    var gen = generateDefaultWeekData(state.currentWeek);
    if (gen) WEEK_DATA[state.currentWeek] = gen;
  }
  const week = WEEK_DATA[state.currentWeek];
  if (!week) {
    container.innerHTML = '<div class="fade-in" style="text-align:center;padding:60px 20px;"><h2>🎉 全部课程已完成！</h2></div>';
    return;
  }
  const totalDays = week.days.length;
  const completedDays = week.days.filter((_, i) => isDayComplete(state.currentWeek, i + 1)).length;
  const isWeekComplete = completedDays >= totalDays;

  // 获取所有语法点并按健康度排序
  const allGps = state.allGrammarPoints.length > 0 ? state.allGrammarPoints : (week ? week.grammarPoints : []);
  const sortedGps = [...allGps].sort((a, b) => {
    const statusA = getStatusLabel(a);
    const statusB = getStatusLabel(b);
    const order = { 'badge-red': 0, 'badge-yellow': 1, 'badge-green': 2, 'badge-new': 3 };
    return (order[statusA.cls] || 3) - (order[statusB.cls] || 3);
  });

  let dayHistory = '';
  week.days.forEach((day, i) => {
    const d = i + 1;
    const complete = isDayComplete(state.currentWeek, d);
    const score = getDayScore(state.currentWeek, d);
    dayHistory += `<div class="content-card" style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;margin-bottom:8px;cursor:pointer;" onclick="startPracticeOfDay(${d})">
      <div>
        <div style="font-weight:600;font-size:14px;">Day ${d}：${day.title}</div>
        <div style="font-size:12px;color:var(--muted);">${day.type}</div>
      </div>
      <div style="text-align:right;">
        ${complete ? `<span style="color:var(--accent2);font-weight:600;">✅ ${score ? score.correct + '/' + score.total : '完成'}</span>` : `<span style="color:var(--accent);font-weight:600;">○ 开始</span>`}
      </div>
    </div>`;
  });

  // 语法点健康度卡片
  let grammarHealthHtml = '';
  sortedGps.forEach(g => {
    const m = getGrammarMastery(g);
    const st = getStatusLabel(g);
    const barColor = st.cls === 'badge-green' ? 'var(--accent2)' : st.cls === 'badge-yellow' ? 'var(--gold)' : st.cls === 'badge-red' ? 'var(--accent)' : 'var(--muted)';
    const statusIcon = st.cls === 'badge-green' ? '🟢' : st.cls === 'badge-yellow' ? '🟡' : st.cls === 'badge-red' ? '🔴' : '⚪';
    
    // 找到该语法点对应的天数
    let relatedDay = null;
    if (week && week.days) {
      for (let i = 0; i < week.days.length; i++) {
        const day = week.days[i];
        if (day.content && day.content.some(c => c.title && c.title.includes(g))) {
          relatedDay = i + 1;
          break;
        }
      }
    }
    
    grammarHealthHtml += `<div class="grammar-lib-item" onclick="${relatedDay ? `startPracticeOfDay(${relatedDay})` : `switchView('grammarlib')`}">
      <div class="grammar-lib-header">
        <div class="grammar-lib-name">
          <span style="width:10px;height:10px;border-radius:50%;background:${st.color};display:inline-block;"></span>
          ${g}
        </div>
        <div class="grammar-lib-status" style="color:${st.color};">
          ${statusIcon} ${st.label}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
        <div class="mastery-bar-wrap" style="flex:1;height:8px;">
          <div class="mastery-bar-fill" style="width:${m.score}%;background:${barColor};"></div>
        </div>
        <span style="font-size:12px;color:var(--muted);min-width:60px;">${m.score}% (${m.correct}/${m.attempts})</span>
      </div>
      ${st.cls !== 'badge-green' ? `<button class="grammar-lib-action" style="margin-top:8px;">${st.cls === 'badge-red' ? '🔴 立即复习' : '🟡 开始练习'}</button>` : ''}
    </div>`;
  });
  
  // 红色语法点提示
  let redAlert = '';
  const redPoints = getRedGrammarPoints();
  if (redPoints.length > 0) {
    redAlert = `<div style="padding:12px 16px;background:#FFEBEE;border:1px solid #EF9A9A;border-radius:var(--radius);margin-bottom:16px;font-size:14px;">
      <strong style="color:var(--accent);">🔴 需要优先复习：</strong>
      <span style="color:var(--ink-soft);">${redPoints.join('、')}</span>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;">这些语法点需要加强练习，点击可快速开始</div>
    </div>`;
  }

  // 统计概览
  const overallMastery = getOverallMastery();
  
  container.innerHTML = `
    <div class="fade-in">
      <div style="margin-bottom:24px;">
        <h2 style="font-size:20px;font-weight:700;">📈 学习进度</h2>
        <p style="font-size:13px;color:var(--muted);">第${state.currentWeek}周 · ${completedDays}/${totalDays} 天完成</p>
      </div>

      <!-- 统计卡片 -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:14px;text-align:center;">
          <div style="font-size:24px;font-weight:700;color:var(--accent);">${state.totalExercises}</div>
          <div style="font-size:11px;color:var(--muted);">总练习数</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:14px;text-align:center;">
          <div style="font-size:24px;font-weight:700;color:var(--accent2);">${overallMastery}%</div>
          <div style="font-size:11px;color:var(--muted);">正确率</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--rule);border-radius:var(--radius);padding:14px;text-align:center;">
          <div style="font-size:24px;font-weight:700;color:var(--gold);">${completedWeeks.length}</div>
          <div style="font-size:11px;color:var(--muted);">完成周数</div>
        </div>
      </div>

      ${redAlert}

      <h3 style="font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent2);">📅 每日完成情况</h3>
      ${dayHistory}

      <h3 style="font-size:15px;font-weight:600;margin:20px 0 12px;color:var(--accent2);">🎯 语法健康度</h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">按优先级排序，点击语法点开始专项练习</p>
      ${grammarHealthHtml}

      <div style="text-align:center;margin-top:24px;padding:20px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--rule);">
        <p style="font-size:13px;color:var(--muted);">学习数据保存在浏览器中，清除浏览器数据会丢失进度。</p>
        <button onclick="if(confirm('确定要重置所有学习数据吗？')){localStorage.removeItem('${STORAGE_KEY}');location.reload();}" style="margin-top:10px;padding:6px 16px;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:12px;background:none;cursor:pointer;">重置数据</button>
      </div>
    </div>
  `;
}

// ============================================================
// WORD BANK VIEW
// ============================================================
const WB_STORAGE_KEY = 'nihongo_wordbank_learned';

function getLearnedWords() {
  try {
    const data = localStorage.getItem(WB_STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

function saveLearnedWords(words) {
  localStorage.setItem(WB_STORAGE_KEY, JSON.stringify(words));
}

function toggleWordLearned(kanji) {
  const learned = getLearnedWords();
  const idx = learned.indexOf(kanji);
  if (idx >= 0) learned.splice(idx, 1);
  else learned.push(kanji);
  saveLearnedWords(learned);
  // Update card visual
  const card = document.querySelector(`.wb-word-card[data-word="${kanji}"]`);
  if (card) card.classList.toggle('learned');
}

function renderWordBank() {
  const entries = Object.entries(WORD_BANK);
  const total = entries.length;
  const learned = getLearnedWords();

  container.innerHTML = `
    <div class="fade-in">
      <div style="margin-bottom:24px;">
        <h2 style="font-size:20px;font-weight:700;">📖 单词本</h2>
        <p style="font-size:13px;color:var(--muted);">课程中出现的 N3+ 级别单词，点击可标记为"已掌握"</p>
      </div>
      <div class="wb-header">
        <input type="text" class="wb-search" id="wbSearch" placeholder="🔍 搜索单词（汉字或读音）..." autocomplete="off">
        <span style="font-size:13px;color:var(--muted);">掌握 ${learned.length}/${total}</span>
      </div>
      <div class="wb-count" id="wbCount">共 ${total} 个单词</div>
      <div class="wb-word-grid" id="wbGrid">
        ${entries.map(([kanji, reading]) => `
          <div class="wb-word-card ${learned.includes(kanji) ? 'learned' : ''}" data-word="${kanji}" onclick="toggleWordLearned('${kanji.replace(/'/g, "\\'")}')">
            <span class="wb-word-kanji">${kanji}</span>
            <span class="wb-word-reading">${reading}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Search functionality
  document.getElementById('wbSearch').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    const cards = document.querySelectorAll('.wb-word-card');
    let count = 0;
    cards.forEach(card => {
      const kanji = card.dataset.word;
      const reading = WORD_BANK[kanji] || '';
      const match = !q || kanji.includes(q) || reading.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) count++;
    });
    document.getElementById('wbCount').textContent = q
      ? `找到 ${count} 个单词（共 ${total} 个）`
      : `共 ${total} 个单词（已掌握 ${getLearnedWords().length} 个）`;
  });
}

// ============================================================
// NAVIGATION
// ============================================================
document.querySelectorAll('.bottom-nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ============================================================
// INIT
// ============================================================
render();
</script>
